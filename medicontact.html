<!Doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="Style/mediCare.css">
    <title>Contact</title>
</head>
<body>
<header class="header">
    <nav class="navbar">
        <img src="Img/mediCare.png" alt="Logo MedicCare" class="logo">
        <ul>
            <li><a href="medic.html">Accueil</a></li>
            <li><a href="mediPersonnel.html">Personnel</a></li>
            <li><a href="mediHealth.html">Premier secours</a></li>
            <li><a href="medicontact.html">Contact</a></li>
        </ul>
    </nav>
</header>
<main class="form">
    <form class="contact-container" method="POST" action="/login">
        <fieldset>
            <legend>Contactez-nous</legend>
            <div class="contact-group">
                <span class="form-genre">Genre</span>

                <div class="radio-group">
                    <label>
                        <input type="radio" name="genre" value="Homme" required>
                        Homme
                    </label>

                    <label>
                        <input type="radio" name="genre" value="Femme" required>
                        Femme
                    </label>

                    <label>
                        <input type="radio" name="genre" value="X" required>
                        X
                    </label>
                </div>
            </div>
            <div class="contact-group">
                <label for="service">Choisissez un service :</label>
                <select id="service" name="service" required>
                    <option value="">-- Sélectionnez un service --</option>
                    <option value="general">Médecine générale</option>
                    <option value="chirurgie">Chirurgie</option>
                    <option value="oncologie">Oncologie</option>
                    <option value="radiologie">Radiologie</option>
                    <option value="pediatrie">Pédiatrie</option>
                    <option value="urgences">Service des urgences</option>
                </select>
            </div>
            <div class="contact-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="exemple@yourmail.com" required>
            </div>

            <div class="contact-group">
                <label for="message">Votre message ?</label>
                <textarea id="message"  placeholder="Quel est votre message ?" required></textarea>
            </div>

            <div class="contact-link">
                <button type="submit">Envoyer</button>
            </div>
        </fieldset>
    </form>
</main>
<footer>
    <section class="footer">
        <img src="Img/mediCare.png" alt="Logo" class="logoFooter">

        <div class="contact">
            <p>Tel: 0412345678</p>
            <p>Email: mediCare@info.com</p>
            <a href="./medicontact.html">Contact</a>
        </div>
    </section>
</footer>
</body>
</html>
